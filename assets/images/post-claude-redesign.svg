<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1117"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="200" cy="120" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="350" cy="40" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="500" cy="90" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="50" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="900" cy="30" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="1050" cy="80" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="1150" cy="110" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="150" cy="550" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="1000" cy="580" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Desk -->
  <rect x="100" y="440" width="1000" height="20" rx="6" fill="#2a2d3e"/>
  <rect x="150" y="460" width="30" height="100" fill="#1e2130"/>
  <rect x="1020" y="460" width="30" height="100" fill="#1e2130"/>

  <!-- Laptop body -->
  <rect x="350" y="290" width="500" height="310" rx="8" fill="#1a1a2e" stroke="#3d5af1" stroke-width="3"/>
  <!-- Screen -->
  <rect x="370" y="310" width="460" height="260" rx="4" fill="#0d1117"/>
  <!-- Screen glow -->
  <rect x="370" y="310" width="460" height="260" rx="4" fill="url(#screenGlow)" opacity="0.3"/>

  <!-- Code on screen -->
  <text x="390" y="345" font-family="monospace" font-size="13" fill="#3d5af1">$ claude brainstorm redesign</text>
  <text x="390" y="368" font-family="monospace" font-size="11" fill="#50fa7b">✓ Exploring project context...</text>
  <text x="390" y="388" font-family="monospace" font-size="11" fill="#8be9fd">? Should the home page feel more</text>
  <text x="390" y="406" font-family="monospace" font-size="11" fill="#8be9fd">  like a magazine or a feed?</text>
  <text x="390" y="426" font-family="monospace" font-size="11" fill="#f1fa8c">→ magazine</text>
  <text x="390" y="448" font-family="monospace" font-size="11" fill="#50fa7b">✓ Spec written: hero + grid layout</text>
  <text x="390" y="470" font-family="monospace" font-size="11" fill="#ff79c6">! EOFError: end of file reached</text>
  <text x="390" y="490" font-family="monospace" font-size="11" fill="#f8f8f2">→ rename main.scss → main.css</text>
  <text x="390" y="512" font-family="monospace" font-size="11" fill="#50fa7b">✓ All 8 tasks complete</text>
  <!-- Cursor blink -->
  <rect x="390" y="525" width="8" height="14" fill="#3d5af1" opacity="0.9"/>

  <!-- Robot body -->
  <rect x="820" y="240" width="160" height="200" rx="20" fill="#3d5af1"/>
  <!-- Robot belly -->
  <rect x="840" y="280" width="120" height="80" rx="8" fill="#0d1117"/>
  <!-- Belly light -->
  <circle cx="880" cy="320" r="10" fill="#50fa7b" opacity="0.9"/>
  <circle cx="920" cy="320" r="10" fill="#ff79c6" opacity="0.9"/>

  <!-- Robot head -->
  <rect x="830" y="160" width="140" height="100" rx="20" fill="#4a6cf7"/>
  <!-- Robot eyes -->
  <ellipse cx="868" cy="205" rx="18" ry="18" fill="#0d1117"/>
  <ellipse cx="932" cy="205" rx="18" ry="18" fill="#0d1117"/>
  <circle cx="868" cy="205" r="10" fill="#50fa7b"/>
  <circle cx="932" cy="205" r="10" fill="#50fa7b"/>
  <circle cx="872" cy="201" r="3" fill="#ffffff"/>
  <circle cx="936" cy="201" r="3" fill="#ffffff"/>
  <!-- Robot mouth -->
  <path d="M 865 230 Q 900 250 935 230" stroke="#0d1117" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Robot antenna -->
  <line x1="900" y1="160" x2="900" y2="130" stroke="#4a6cf7" stroke-width="5" stroke-linecap="round"/>
  <circle cx="900" cy="125" r="10" fill="#ff79c6"/>

  <!-- Robot arms -->
  <!-- Left arm (pointing at screen) -->
  <rect x="730" y="270" width="90" height="30" rx="15" fill="#4a6cf7"/>
  <circle cx="730" cy="285" r="15" fill="#3d5af1"/>
  <!-- Right arm -->
  <rect x="980" y="300" width="80" height="30" rx="15" fill="#4a6cf7"/>
  <circle cx="1060" cy="315" r="15" fill="#3d5af1"/>

  <!-- Robot legs -->
  <rect x="845" y="435" width="40" height="60" rx="10" fill="#3d5af1"/>
  <rect x="915" y="435" width="40" height="60" rx="10" fill="#3d5af1"/>
  <!-- Feet -->
  <ellipse cx="865" cy="492" rx="25" ry="10" fill="#2a3fc7"/>
  <ellipse cx="935" cy="492" rx="25" ry="10" fill="#2a3fc7"/>

  <!-- Speech bubble -->
  <rect x="200" y="160" width="340" height="130" rx="20" fill="#ffffff"/>
  <polygon points="340,290 310,320 380,290" fill="#ffffff"/>
  <text x="225" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1117">I'll redesign your blog.</text>
  <text x="225" y="225" font-family="Arial, sans-serif" font-size="14" fill="#555">First, let me crash your</text>
  <text x="225" y="248" font-family="Arial, sans-serif" font-size="14" fill="#555">machine a little. 🙂</text>
  <text x="225" y="278" font-family="Arial, sans-serif" font-size="11" fill="#888">— EOFError: end of file reached</text>

  <!-- Title text at bottom -->
  <text x="600" y="595" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.7">Superpowers · Claude Code · Jekyll</text>

  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d5af1"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>
</svg>
